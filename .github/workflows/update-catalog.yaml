name: update-catalog

on:
  workflow_dispatch:
    inputs:
      force:
        description: Rebuild all sources even when versions are unchanged
        type: boolean
        default: false
  schedule:
    - cron: "0 6 * * *" # every day at 6 AM (UTC)

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      # Signed SLSA provenance for the history manifests (Sigstore via GitHub).
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Setup flux-schema
        uses: fluxcd/flux-schema/actions/setup@a19a8a3a3400b3f937135ea82533f923d211798a # v0.8.0
      - name: Setup flux-operator
        uses: controlplaneio-fluxcd/flux-operator/actions/setup@be9fe84303cf7b8337b74aad1f7e1ccdafa17274 # v0.53.0
      - name: Update catalog
        id: build
        env:
          GITHUB_TOKEN: ${{ github.token }}
          FORCE_BUILD: ${{ inputs.force == true && '1' || '' }}
          BUILD_SUMMARY: ${{ runner.temp }}/pr-body.md
          RUN_TO_COMPLETION: "1"
        run: make build
      - name: Checkout example repository
        if: steps.build.outputs.changed == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: fluxcd/flux2-kustomize-helm-example
          path: example
      - name: Configure smoke test
        if: steps.build.outputs.changed == 'true'
        run: |
          cat > .fluxschema-smoke.yml <<EOF
          apiVersion: schema.plugin.fluxcd.io/v1beta1
          kind: Config
          validate:
            schemaLocation:
              - ${GITHUB_WORKSPACE}/catalog
          EOF
      - name: Test validate action
        if: steps.build.outputs.changed == 'true'
        uses: fluxcd/flux-schema/actions/validate@a19a8a3a3400b3f937135ea82533f923d211798a # v0.8.0
        with:
          path: example
          config: .fluxschema-smoke.yml
      # Each history manifest pins its source's commit, extraction input and
      # catalog files by digest, so attesting the manifests this run rebuilt
      # covers their catalog files without listing schemas as subjects. Only
      # rebuilt manifests are attested: SLSA subjects must be artifacts this
      # run produced (a force dispatch rebuilds and attests all). Verify with:
      #   gh attestation verify build/history/<name>.json -R <owner>/<repo>
      - name: List rebuilt manifests
        if: steps.build.outputs.changed == 'true'
        id: manifests
        run: |
          {
            echo "date=$(date -u +%F)"
            echo 'paths<<EOF'
            git diff --name-only --diff-filter=d -- build/history
            git ls-files --others --exclude-standard -- build/history
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Attest build provenance
        if: steps.build.outputs.changed == 'true' && steps.manifests.outputs.paths != ''
        id: attest
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: ${{ steps.manifests.outputs.paths }}
      - name: Link attestation in PR body
        if: steps.build.outputs.changed == 'true' && steps.attest.outputs.attestation-url != ''
        env:
          ATTESTATION_URL: ${{ steps.attest.outputs.attestation-url }}
          BUILD_SUMMARY: ${{ runner.temp }}/pr-body.md
        run: |
          printf '\nProvenance: [signed attestation](%s) for the rebuilt history manifests.\n' \
            "$ATTESTATION_URL" >> "$BUILD_SUMMARY"
      - name: Create Pull Request
        if: steps.build.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: update-catalog
          title: "Update catalog (${{ steps.manifests.outputs.date }})"
          commit-message: "Update catalog (${{ steps.manifests.outputs.date }})"
          committer: GitHub <noreply@github.com>
          signoff: true
          body-path: ${{ runner.temp }}/pr-body.md
          add-paths: |
            catalog
            build/history
            README.md
