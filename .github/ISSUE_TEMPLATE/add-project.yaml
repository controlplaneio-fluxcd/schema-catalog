name: Add a project
description: Request a project to be added to the schema catalog.
title: "Add <project> to the catalog"
labels: ["enhancement"]
body:
  - type: input
    id: name
    attributes:
      label: Project name
      description: The project's name as it should appear in the catalog.
      placeholder: e.g. Flux
    validations:
      required: true
  - type: input
    id: repo
    attributes:
      label: Repository URL
      description: The upstream GitHub repository that publishes the project's CRDs.
      placeholder: https://github.com/<owner>/<name>
    validations:
      required: true
  - type: checkboxes
    id: maintained
    attributes:
      label: Maintenance status
      options:
        - label: The project is actively maintained and publishes versioned releases.
          required: true
