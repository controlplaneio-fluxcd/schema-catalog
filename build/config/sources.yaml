# Catalog sources, processed in order by `bun run build`.
# Config format: see build/src/types.ts.
sources:
  - name: kubernetes
    alias: Kubernetes
    category: "Orchestration & Management"
    url: https://github.com/kubernetes/kubernetes
    extract: k8s

  - name: openshift
    alias: OpenShift
    category: "Platform"
    url: https://github.com/openshift/api
    extract: openshift

  - name: flux
    alias: Flux
    category: "App Definition & Development"
    url: https://github.com/fluxcd/flux2
    extract: crd
    input:
      fluxInstance:
        registry: ghcr.io/fluxcd
        components:
          - source-controller
          - source-watcher
          - kustomize-controller
          - helm-controller
          - notification-controller
          - image-reflector-controller
          - image-automation-controller

  - name: flagger
    alias: Flagger
    category: "App Definition & Development"
    url: https://github.com/fluxcd/flagger
    extract: crd
    input:
      kustomize: kustomize/kubernetes

  - name: flux-operator
    alias: Flux Operator
    category: "App Definition & Development"
    url: https://github.com/controlplaneio-fluxcd/flux-operator
    extract: crd
    input:
      kustomize: config/crd

  - name: cluster-api
    alias: Cluster API
    category: "Provisioning"
    url: https://github.com/kubernetes-sigs/cluster-api
    extract: crd
    input:
      releaseAsset: cluster-api-components.yaml

  - name: cluster-api-operator
    alias: Cluster API Operator
    category: "Provisioning"
    url: https://github.com/kubernetes-sigs/cluster-api-operator
    extract: crd
    input:
      # operator.cluster.x-k8s.io provider-install CRDs (Core/Bootstrap/ControlPlane/
      # Infrastructure/Addon/IPAM/RuntimeExtension Provider); distinct group from the
      # core Cluster API CRDs. Per-kind base files, no release asset.
      crdDir: config/crd/bases

  - name: cluster-api-addon-provider-helm
    alias: Cluster API Add-on Provider Helm
    category: "Provisioning"
    url: https://github.com/kubernetes-sigs/cluster-api-addon-provider-helm
    extract: crd
    input:
      # addons.cluster.x-k8s.io HelmChartProxy + HelmReleaseProxy — the same group
      # as core Cluster API's ClusterResourceSet kinds but distinct kinds, so no
      # collision. Per-kind base files, no release asset.
      crdDir: config/crd/bases

  - name: gateway-api
    alias: Gateway API
    category: "Orchestration & Management"
    url: https://github.com/kubernetes-sigs/gateway-api
    extract: crd
    input:
      kustomize: config/crd

  - name: cert-manager
    alias: Cert Manager
    category: "Provisioning"
    url: https://github.com/cert-manager/cert-manager
    extract: crd
    input:
      releaseAsset: cert-manager.crds.yaml

  - name: trust-manager
    alias: Trust Manager
    category: "Provisioning"
    url: https://github.com/cert-manager/trust-manager
    extract: crd
    input:
      # cert-manager's trust-manager ships no CRD release asset; the two CRDs
      # (group trust.cert-manager.io: Bundle, and trust-manager.io: ClusterBundle)
      # are bare files under deploy/crds — the helm-templated copies live under
      # deploy/charts, so crdDir fetches the plain deploy/crds tree.
      crdDir: deploy/crds

  - name: external-secrets
    alias: External Secrets
    category: "Provisioning"
    url: https://github.com/external-secrets/external-secrets
    extract: crd
    input:
      # external-secrets interleaves helm-chart-* releases with the app v*
      # releases, so releaseTag pins version resolution to the app tags.
      releaseTag: "v*"
      releaseAsset: external-secrets.yaml

  - name: onepassword-operator
    alias: 1Password Operator
    category: "Provisioning"
    url: https://github.com/1Password/onepassword-operator
    extract: crd
    input:
      # onepassword.com (OnePasswordItem); the releases carry no assets, and the
      # single CRD is the only file under config/crd/bases (no kustomization),
      # so crdDir fetches the tree.
      crdDir: config/crd/bases

  - name: cilium
    alias: Cilium
    category: "Runtime"
    url: https://github.com/cilium/cilium
    extract: crd
    input:
      # cilium ships CRDs as bare per-kind YAML files (v2, v2alpha1) with no
      # release asset or kustomization, so crdDir fetches the tree directly.
      crdDir: pkg/k8s/apis/cilium.io/client/crds

  - name: tailscale
    alias: Tailscale
    category: "Runtime"
    url: https://github.com/tailscale/tailscale
    extract: crd
    input:
      # tailscale.com CRDs (Connector, DNSConfig, ProxyClass, ProxyGroup,
      # ProxyGroupPolicy, Recorder, Tailnet) ship as bare per-kind files under
      # the k8s-operator deploy dir with no release asset, so crdDir fetches
      # the tree.
      crdDir: cmd/k8s-operator/deploy/crds

  - name: prometheus-operator
    alias: Prometheus Operator
    category: "Observability & Analysis"
    url: https://github.com/prometheus-operator/prometheus-operator
    extract: crd
    input:
      releaseAsset: bundle.yaml

  - name: victoriametrics-operator
    alias: VictoriaMetrics Operator
    category: "Observability & Analysis"
    url: https://github.com/VictoriaMetrics/operator
    extract: crd
    input:
      releaseAsset: crd.yaml

  - name: fluent-operator
    alias: Fluent Operator
    category: "Observability & Analysis"
    url: https://github.com/fluent/fluent-operator
    extract: crd
    input:
      # fluent-operator ships one asset, setup.yaml, a full install bundle;
      # the extractor picks out the CRDs and drops the RBAC/Deployment docs.
      releaseAsset: setup.yaml

  - name: keda
    alias: KEDA
    category: "Orchestration & Management"
    url: https://github.com/kedacore/keda
    extract: crd
    input:
      # keda's CRD asset embeds the version in its name (keda-<ver>-crds.yaml),
      # so a glob selects it independent of the resolved release.
      releaseAsset: "keda-*-crds.yaml"

  - name: knative-serving
    alias: Knative Serving
    category: "App Definition & Development"
    url: https://github.com/knative/serving
    extract: crd
    input:
      releaseAsset: serving-crds.yaml

  - name: knative-eventing
    alias: Knative Eventing
    category: "App Definition & Development"
    url: https://github.com/knative/eventing
    extract: crd
    input:
      releaseAsset: eventing-crds.yaml

  - name: tekton-pipeline
    alias: Tekton Pipeline
    category: "App Definition & Development"
    url: https://github.com/tektoncd/pipeline
    extract: crd
    input:
      # tekton ships no CRD-only asset; release.yaml is the full install
      # bundle and the extractor picks out the CRDs. (Triggers/Chains are
      # skipped: Triggers' CRDs are preserve-unknown stubs, Chains has none.)
      releaseAsset: release.yaml

  - name: kyverno
    alias: Kyverno
    category: "Provisioning"
    url: https://github.com/kyverno/kyverno
    extract: crd
    input:
      # kyverno ships only per-CRD assets (no single CRD bundle), so install.yaml
      # is the one asset carrying every CRD; the extractor drops the non-CRD docs.
      releaseAsset: install.yaml

  - name: sigstore-policy-controller
    alias: Sigstore Policy Controller
    category: "Provisioning"
    url: https://github.com/sigstore/policy-controller
    extract: crd
    input:
      # policy.sigstore.dev CRDs (ClusterImagePolicy, TrustRoot). No CRD-only
      # asset; the config dir's kustomization renders the full install bundle
      # and the extractor picks out the CRDs, dropping the RBAC/webhook/config
      # docs.
      kustomize: config

  - name: rook
    alias: Rook
    category: "Runtime"
    url: https://github.com/rook/rook
    extract: crd
    input:
      # rook publishes no release assets; its whole CRD set is one committed file
      # that shares deploy/examples with ~99 unrelated manifests, so crdFile
      # fetches just that bundle.
      crdFile: deploy/examples/crds.yaml

  - name: vitess-operator
    alias: Vitess Operator
    category: "App Definition & Development"
    url: https://github.com/planetscale/vitess-operator
    extract: crd
    input:
      # vitess CRDs live in the operator repo as bare per-kind files with no
      # release asset, so crdDir fetches the tree directly.
      crdDir: deploy/crds

  - name: strimzi
    alias: Strimzi
    category: "App Definition & Development"
    url: https://github.com/strimzi/strimzi-kafka-operator
    extract: crd
    input:
      # strimzi maintains two concurrent lines: 0.x still serves both v1beta2
      # (what essentially every real manifest uses) and v1, while the newer 1.x
      # serves v1 only. Pin to 0.x for the wider coverage, and so neither line
      # regresses the other via GitHub's /releases/latest. The CRD asset embeds
      # the version, hence the glob.
      releaseTag: "0.*"
      releaseAsset: "strimzi-crds-*.yaml"

  - name: nats
    alias: NATS
    category: "App Definition & Development"
    url: https://github.com/nats-io/nack
    extract: crd
    input:
      # NATS CRDs (JetStream) ship from nack, the NATS Controllers for
      # Kubernetes; nats-operator is deprecated. crds.yml is the CRD-only asset.
      releaseAsset: crds.yml

  - name: opentelemetry
    alias: OpenTelemetry
    category: "Observability & Analysis"
    url: https://github.com/open-telemetry/opentelemetry-operator
    extract: crd
    input:
      # No CRD-only asset; opentelemetry-operator.yaml is the full install
      # bundle and the extractor picks out the CRDs. (Descriptions are sparse
      # upstream — the collector config is a preserve-unknown-fields map.)
      releaseAsset: opentelemetry-operator.yaml

  - name: gatekeeper
    alias: OPA Gatekeeper
    category: "Provisioning"
    url: https://github.com/open-policy-agent/gatekeeper
    extract: crd
    input:
      # gatekeeper's releases ship only the gator CLI; the CRDs are bare
      # per-kind files in the Helm chart, so crdDir fetches that tree. (Only
      # the framework CRDs are here; per-constraint kinds are generated at
      # runtime from ConstraintTemplates and cannot be catalogued.)
      crdDir: charts/gatekeeper/crds

  - name: envoy-gateway
    alias: Envoy Gateway
    category: "Orchestration & Management"
    url: https://github.com/envoyproxy/gateway
    extract: crd
    input:
      # envoy-gateway-crds.yaml carries only the gateway.envoyproxy.io policy
      # CRDs (no Gateway API CRDs, so no collision with the gateway-api source).
      releaseAsset: envoy-gateway-crds.yaml

  - name: longhorn
    alias: Longhorn
    category: "Runtime"
    url: https://github.com/longhorn/longhorn
    extract: crd
    input:
      # longhorn.yaml is the full install bundle; the extractor picks out the
      # 23 longhorn.io CRDs and drops the RBAC/Deployment/DaemonSet docs.
      releaseAsset: longhorn.yaml

  - name: vertical-pod-autoscaler
    alias: Vertical Pod Autoscaler
    category: "Orchestration & Management"
    url: https://github.com/kubernetes/autoscaler
    extract: crd
    input:
      # kubernetes/autoscaler is a monorepo whose /releases/latest is whatever
      # component shipped last (usually cluster-autoscaler). releaseTag pins
      # resolution to VPA's own tags; the wildcard-must-be-a-version rule keeps
      # the vertical-pod-autoscaler-chart-* helm tags from matching. The
      # resolved tag doubles as the crdFile git ref.
      releaseTag: "vertical-pod-autoscaler-*"
      crdFile: vertical-pod-autoscaler/deploy/vpa-v1-crd-gen.yaml

  - name: kueue
    alias: Kueue
    category: "Orchestration & Management"
    url: https://github.com/kubernetes-sigs/kueue
    extract: crd
    input:
      # manifests.yaml is the full install bundle; the extractor picks out the
      # kueue.x-k8s.io CRDs and drops the non-CRD docs.
      releaseAsset: manifests.yaml

  - name: cloudnative-pg
    alias: CloudNativePG
    category: "App Definition & Development"
    url: https://github.com/cloudnative-pg/cloudnative-pg
    extract: crd
    input:
      # the operator install bundle embeds the version in its name
      # (cnpg-<ver>.yaml), so a glob selects it; the extractor keeps the CRDs.
      releaseAsset: "cnpg-*.yaml"

  - name: secrets-store-csi-driver
    alias: Secrets Store CSI Driver
    category: "Provisioning"
    url: https://github.com/kubernetes-sigs/secrets-store-csi-driver
    extract: crd
    input:
      # no CRD release asset; the two CRDs are bare files under config/crd/bases.
      crdDir: config/crd/bases

  - name: velero
    alias: Velero
    category: "Runtime"
    url: https://github.com/vmware-tanzu/velero
    extract: crd
    input:
      # velero ships no CRD asset (its CLI embeds them); the CRDs are bare
      # per-kind files under config/crd/v1/bases.
      crdDir: config/crd/v1/bases

  - name: crossplane
    alias: Crossplane
    category: "Provisioning"
    url: https://github.com/crossplane/crossplane
    extract: crd
    input:
      # crossplane ships no CRD release asset (the release carries only the
      # source tarball); its CRDs are bare per-kind files under cluster/crds,
      # so crdDir fetches the tree directly.
      crdDir: cluster/crds

  - name: provider-upjet-aws
    alias: Upbound AWS Provider
    category: "Provisioning"
    url: https://github.com/crossplane-contrib/provider-upjet-aws
    extract: crd
    input:
      # the Upbound AWS provider generates ~2000 CRDs (classic *.aws.upbound.io
      # plus the .m. v2 namespaced groups) as per-kind files under package/crds,
      # with no CRD release asset; crdDir fetches the repo tarball and extracts
      # that tree in one request.
      crdDir: package/crds

  - name: provider-upjet-azure
    alias: Upbound Azure Provider
    category: "Provisioning"
    url: https://github.com/crossplane-contrib/provider-upjet-azure
    extract: crd
    input:
      # same shape as the AWS provider: ~1500 generated CRDs (classic
      # *.azure.upbound.io plus .m. v2 groups) under package/crds, no release
      # asset; fetched via the repo tarball.
      crdDir: package/crds

  - name: provider-upjet-gcp
    alias: Upbound GCP Provider
    category: "Provisioning"
    url: https://github.com/crossplane-contrib/provider-upjet-gcp
    extract: crd
    input:
      # same shape as the AWS provider: ~800 generated CRDs (classic
      # *.gcp.upbound.io plus .m. v2 groups) under package/crds, no release
      # asset; fetched via the repo tarball.
      crdDir: package/crds

  # AWS Controllers for Kubernetes (ACK) — AWS's official operators, one repo
  # per service under the aws-controllers-k8s org. Each ships its CRDs
  # (group <service>.services.k8s.aws) as per-kind files under config/crd/bases
  # with no release asset, so crdDir fetches the repo tree. A curated set of the
  # most-used services; distinct from the community *.aws.upbound.io API.
  - name: ack-s3
    alias: AWS S3 Controller
    category: "Provisioning"
    url: https://github.com/aws-controllers-k8s/s3-controller
    extract: crd
    input:
      crdDir: config/crd/bases

  - name: ack-rds
    alias: AWS RDS Controller
    category: "Provisioning"
    url: https://github.com/aws-controllers-k8s/rds-controller
    extract: crd
    input:
      crdDir: config/crd/bases

  - name: ack-ec2
    alias: AWS EC2 Controller
    category: "Provisioning"
    url: https://github.com/aws-controllers-k8s/ec2-controller
    extract: crd
    input:
      crdDir: config/crd/bases

  - name: ack-iam
    alias: AWS IAM Controller
    category: "Provisioning"
    url: https://github.com/aws-controllers-k8s/iam-controller
    extract: crd
    input:
      crdDir: config/crd/bases

  - name: ack-dynamodb
    alias: AWS DynamoDB Controller
    category: "Provisioning"
    url: https://github.com/aws-controllers-k8s/dynamodb-controller
    extract: crd
    input:
      crdDir: config/crd/bases

  - name: ack-lambda
    alias: AWS Lambda Controller
    category: "Provisioning"
    url: https://github.com/aws-controllers-k8s/lambda-controller
    extract: crd
    input:
      crdDir: config/crd/bases

  - name: ack-eks
    alias: AWS EKS Controller
    category: "Provisioning"
    url: https://github.com/aws-controllers-k8s/eks-controller
    extract: crd
    input:
      crdDir: config/crd/bases

  - name: ack-ecr
    alias: AWS ECR Controller
    category: "Provisioning"
    url: https://github.com/aws-controllers-k8s/ecr-controller
    extract: crd
    input:
      crdDir: config/crd/bases

  - name: ack-sns
    alias: AWS SNS Controller
    category: "Provisioning"
    url: https://github.com/aws-controllers-k8s/sns-controller
    extract: crd
    input:
      crdDir: config/crd/bases

  - name: ack-sqs
    alias: AWS SQS Controller
    category: "Provisioning"
    url: https://github.com/aws-controllers-k8s/sqs-controller
    extract: crd
    input:
      crdDir: config/crd/bases

  - name: ack-elasticache
    alias: AWS ElastiCache Controller
    category: "Provisioning"
    url: https://github.com/aws-controllers-k8s/elasticache-controller
    extract: crd
    input:
      crdDir: config/crd/bases

  - name: ack-kms
    alias: AWS KMS Controller
    category: "Provisioning"
    url: https://github.com/aws-controllers-k8s/kms-controller
    extract: crd
    input:
      crdDir: config/crd/bases

  - name: ack-secretsmanager
    alias: AWS Secrets Manager Controller
    category: "Provisioning"
    url: https://github.com/aws-controllers-k8s/secretsmanager-controller
    extract: crd
    input:
      crdDir: config/crd/bases

  - name: ack-sagemaker
    alias: AWS SageMaker Controller
    category: "Provisioning"
    url: https://github.com/aws-controllers-k8s/sagemaker-controller
    extract: crd
    input:
      crdDir: config/crd/bases

  - name: ack-memorydb
    alias: AWS MemoryDB Controller
    category: "Provisioning"
    url: https://github.com/aws-controllers-k8s/memorydb-controller
    extract: crd
    input:
      crdDir: config/crd/bases

  - name: ack-kinesis
    alias: AWS Kinesis Controller
    category: "Provisioning"
    url: https://github.com/aws-controllers-k8s/kinesis-controller
    extract: crd
    input:
      crdDir: config/crd/bases

  - name: ack-acm
    alias: AWS ACM Controller
    category: "Provisioning"
    url: https://github.com/aws-controllers-k8s/acm-controller
    extract: crd
    input:
      crdDir: config/crd/bases

  - name: ack-route53
    alias: AWS Route 53 Controller
    category: "Provisioning"
    url: https://github.com/aws-controllers-k8s/route53-controller
    extract: crd
    input:
      crdDir: config/crd/bases

  - name: ack-efs
    alias: AWS EFS Controller
    category: "Provisioning"
    url: https://github.com/aws-controllers-k8s/efs-controller
    extract: crd
    input:
      crdDir: config/crd/bases

  - name: ack-apigatewayv2
    alias: AWS API Gateway v2 Controller
    category: "Provisioning"
    url: https://github.com/aws-controllers-k8s/apigatewayv2-controller
    extract: crd
    input:
      crdDir: config/crd/bases

  - name: azure-service-operator
    alias: Azure Service Operator
    category: "Provisioning"
    url: https://github.com/Azure/azure-service-operator
    extract: crd
    input:
      # Microsoft's official Azure operator (group *.azure.com). Ships a
      # CRD-only release asset with the version embedded in its name, so a glob
      # selects it independent of the resolved release.
      releaseAsset: "azureserviceoperator_customresourcedefinitions_*.yaml"

  - name: config-connector
    alias: GCP Config Connector
    category: "Provisioning"
    url: https://github.com/GoogleCloudPlatform/k8s-config-connector
    extract: crd
    input:
      # Google's official GCP operator (group *.cnrm.cloud.google.com). Ships no
      # CRD release asset; the ~480 CRDs are per-kind files under
      # config/crds/resources, fetched via the repo tarball.
      crdDir: config/crds/resources

  # Karpenter — Kubernetes node autoscaler. The neutral control-plane API
  # (group karpenter.sh: NodePool, NodeClaim, NodeOverlay) lives in the upstream
  # kubernetes-sigs/karpenter repo as per-kind files under pkg/apis/crds with no
  # CRD release asset; crdDir fetches the tree. Each cloud provider below bundles
  # a copy of these same karpenter.sh CRDs next to its own nodeclass, so to avoid
  # double-writing the shared group we take karpenter.sh only from core here and
  # pull just the provider-specific nodeclass file from each provider repo.
  - name: karpenter
    alias: Karpenter
    category: "Orchestration & Management"
    url: https://github.com/kubernetes-sigs/karpenter
    extract: crd
    input:
      crdDir: pkg/apis/crds

  - name: karpenter-aws
    alias: Karpenter AWS
    category: "Orchestration & Management"
    url: https://github.com/aws/karpenter-provider-aws
    extract: crd
    input:
      # only the AWS nodeclass (group karpenter.k8s.aws: EC2NodeClass); this repo
      # also vendors the karpenter.sh CRDs, which come from the core source above.
      crdFile: pkg/apis/crds/karpenter.k8s.aws_ec2nodeclasses.yaml

  - name: karpenter-azure
    alias: Karpenter Azure
    category: "Orchestration & Management"
    url: https://github.com/Azure/karpenter-provider-azure
    extract: crd
    input:
      # only the Azure nodeclass (group karpenter.azure.com: AKSNodeClass); this
      # repo also vendors the karpenter.sh CRDs, which come from the core source.
      crdFile: pkg/apis/crds/karpenter.azure.com_aksnodeclasses.yaml

  - name: karpenter-provider-cluster-api
    alias: Karpenter Cluster API
    category: "Orchestration & Management"
    url: https://github.com/kubernetes-sigs/karpenter-provider-cluster-api
    extract: crd
    input:
      # only the Cluster API nodeclass (group karpenter.cluster.x-k8s.io:
      # ClusterAPINodeClass); core karpenter.sh comes from the core source, and the
      # sibling ...nodeclasslists List-kind CRD is skipped, so crdFile picks one file.
      crdFile: config/crd/bases/karpenter.cluster.x-k8s.io_clusterapinodeclasses.yaml

  - name: karpenter-provider-ibm-cloud
    alias: Karpenter IBM Cloud
    category: "Orchestration & Management"
    url: https://github.com/kubernetes-sigs/karpenter-provider-ibm-cloud
    extract: crd
    input:
      # only the IBM nodeclass (group karpenter-ibm.sh: IBMNodeClass); this repo
      # also vendors the karpenter.sh CRDs, which come from the core source, so
      # crdFile targets just the provider nodeclass.
      crdFile: config/components/crds/karpenter-ibm.sh_ibmnodeclasses.yaml

  - name: spire-controller-manager
    alias: SPIRE Controller Manager
    category: "Provisioning"
    url: https://github.com/spiffe/spire-controller-manager
    extract: crd
    input:
      # no CRD release asset; the four spire.spiffe.io CRDs (ClusterSPIFFEID,
      # ClusterFederatedTrustDomain, ClusterStaticEntry, ControllerManagerConfig)
      # are bare per-kind files under config/crd/bases, so crdDir fetches the tree.
      crdDir: config/crd/bases

  # Argo — the argoproj.io API group is shared across four separate projects,
  # each shipping distinct kinds. Every Argo CRD dir carries a self-contained
  # kustomization.yaml, so the kustomize extractor renders exactly its CRDs.
  - name: argo-cd
    alias: Argo CD
    category: "App Definition & Development"
    url: https://github.com/argoproj/argo-cd
    extract: crd
    input:
      kustomize: manifests/crds

  - name: argo-rollouts
    alias: Argo Rollouts
    category: "App Definition & Development"
    url: https://github.com/argoproj/argo-rollouts
    extract: crd
    input:
      kustomize: manifests/crds

  - name: argo-workflows
    alias: Argo Workflows
    category: "App Definition & Development"
    url: https://github.com/argoproj/argo-workflows
    extract: crd
    input:
      # the 'full' overlay carries complete CRD schemas; the sibling 'minimal'
      # overlay trims them to preserve-unknown-fields stubs.
      kustomize: manifests/base/crds/full

  - name: argo-events
    alias: Argo Events
    category: "App Definition & Development"
    url: https://github.com/argoproj/argo-events
    extract: crd
    input:
      kustomize: manifests/base/crds

  - name: dapr
    alias: Dapr
    category: "App Definition & Development"
    url: https://github.com/dapr/dapr
    extract: crd
    input:
      # dapr ships its dapr.io CRDs as raw files in the Helm chart's crds/ dir
      # (no kustomization), so crdDir fetches the tree directly.
      crdDir: charts/dapr/crds

  # KServe — ML model serving (group serving.kserve.io). config/crd/full is the
  # canonical CRD set (its kustomization aggregates the core kinds plus
  # clusterstoragecontainer, but not the newer llmisvc subdir), so the
  # LLMInferenceService CRDs come from a second source over that subdir.
  - name: kserve
    alias: KServe
    category: "App Definition & Development"
    url: https://github.com/kserve/kserve
    extract: crd
    input:
      kustomize: config/crd/full

  - name: kserve-llmisvc
    alias: KServe LLM
    category: "App Definition & Development"
    url: https://github.com/kserve/kserve
    extract: crd
    input:
      kustomize: config/crd/full/llmisvc

  # Volcano — batch scheduler. Its CRDs span several *.volcano.sh groups as
  # per-kind kubebuilder files with no release asset. The config/crd/*/bases dirs
  # hold the full (all-version) CRDs; sibling v1beta1 dirs are legacy stubs of the
  # same kinds, so crdDir targets bases only to avoid double-writing. JobFlow
  # (flow.volcano.sh) sits in its own dir, hence a second source.
  - name: volcano
    alias: Volcano
    category: "Orchestration & Management"
    url: https://github.com/volcano-sh/volcano
    extract: crd
    input:
      crdDir: config/crd/volcano/bases

  - name: volcano-jobflow
    alias: Volcano JobFlow
    category: "Orchestration & Management"
    url: https://github.com/volcano-sh/volcano
    extract: crd
    input:
      crdDir: config/crd/jobflow/bases

  - name: capsule
    alias: Capsule
    category: "Provisioning"
    url: https://github.com/projectcapsule/capsule
    extract: crd
    input:
      # capsule ships its capsule.clastix.io CRDs as raw per-kind files in the
      # Helm chart's crds/ dir (no kustomization), so crdDir fetches the tree.
      crdDir: charts/capsule/crds

  - name: jobset
    alias: JobSet
    category: "Orchestration & Management"
    url: https://github.com/kubernetes-sigs/jobset
    extract: crd
    input:
      # single CRD (jobset.x-k8s.io JobSet); the kubebuilder base dir holds just
      # that file (the kustomization/patches sit one level up), so crdDir fetches it.
      crdDir: config/components/crd/bases

  - name: lws
    alias: LeaderWorkerSet
    category: "Orchestration & Management"
    url: https://github.com/kubernetes-sigs/lws
    extract: crd
    input:
      # leaderworkerset.x-k8s.io (LeaderWorkerSet) + disaggregatedset.x-k8s.io
      # (DisaggregatedSet) as per-kind base files, no release asset.
      crdDir: config/crd/bases

  # Node Feature Discovery — the nfd.k8s-sigs.io CRDs ship as one bundle file
  # (next to a sample CR, so crdFile targets the bundle), and NodeResourceTopology
  # (topology.node.k8s.io) sits in its own dir as a single CRD file.
  - name: node-feature-discovery
    alias: Node Feature Discovery
    category: "Orchestration & Management"
    url: https://github.com/kubernetes-sigs/node-feature-discovery
    extract: crd
    input:
      crdFile: deployment/base/nfd-crds/nfd-api-crds.yaml

  - name: node-feature-discovery-nrt
    alias: NFD NodeResourceTopology
    category: "Orchestration & Management"
    url: https://github.com/kubernetes-sigs/node-feature-discovery
    extract: crd
    input:
      crdFile: deployment/base/noderesourcetopologies-crd/noderesourcetopologies.yaml

  - name: kwok
    alias: KWOK
    category: "Orchestration & Management"
    url: https://github.com/kubernetes-sigs/kwok
    extract: crd
    input:
      # kwok.x-k8s.io CRDs (Stage, Metric, Attach/Exec/Log/PortForward and their
      # cluster-scoped variants) as per-kind base files, no release asset.
      crdDir: kustomize/crd/bases

  - name: network-policy-api
    alias: Network Policy API
    category: "Runtime"
    url: https://github.com/kubernetes-sigs/network-policy-api
    extract: crd
    input:
      # policy.networking.k8s.io (ClusterNetworkPolicy); the standard CRD dir has
      # a kustomization, so the kustomize extractor renders it. The experimental
      # dir (AdminNetworkPolicy et al.) is intentionally left out.
      kustomize: config/crd/standard

  - name: external-dns
    alias: ExternalDNS
    category: "Orchestration & Management"
    url: https://github.com/kubernetes-sigs/external-dns
    extract: crd
    input:
      # externaldns.k8s.io DNSEndpoint; a single CRD file under config/crd/standard
      # (no kustomization), so crdDir fetches the tree.
      crdDir: config/crd/standard

  - name: aws-load-balancer-controller
    alias: AWS Load Balancer Controller
    category: "Orchestration & Management"
    url: https://github.com/kubernetes-sigs/aws-load-balancer-controller
    extract: crd
    input:
      # elbv2.k8s.aws (TargetGroupBinding, IngressClassParams, ALBTargetControlConfig),
      # gateway.k8s.aws and aga.k8s.aws CRDs ship as two bundle files (crds.yaml +
      # gateway-crds.yaml) in the Helm chart's crds/ dir; the dir's kustomization only
      # lists crds.yaml, so crdDir is used to pick up both bundles (the non-CRD
      # kustomization.yaml is skipped by the extractor).
      crdDir: helm/aws-load-balancer-controller/crds

  - name: kro
    alias: kro
    category: "Provisioning"
    url: https://github.com/kubernetes-sigs/kro
    extract: crd
    input:
      # kro.run (ResourceGraphDefinition) + internal.kro.run (GraphRevision) as raw
      # files in the Helm chart's crds/ dir (no kustomization).
      crdDir: helm/crds

  - name: cosi
    alias: Container Object Storage Interface
    category: "Runtime"
    url: https://github.com/kubernetes-sigs/container-object-storage-interface
    extract: crd
    input:
      # objectstorage.k8s.io (Bucket, BucketClaim, BucketClass, BucketAccess,
      # BucketAccessClass) as per-kind files under client/config/crd.
      crdDir: client/config/crd

  - name: kjob
    alias: kjob
    category: "Orchestration & Management"
    url: https://github.com/kubernetes-sigs/kjob
    extract: crd
    input:
      # kjobctl.x-k8s.io (ApplicationProfile, JobTemplate, RayClusterTemplate,
      # RayJobTemplate, VolumeBundle) as per-kind base files, no release asset.
      crdDir: config/crd/bases

  - name: istio
    alias: Istio
    category: "Orchestration & Management"
    url: https://github.com/istio/istio
    extract: crd
    input:
      # Istio's full CRD set (networking/security/telemetry/extensions.istio.io)
      # ships as one generated bundle consumed by the Helm base chart; crdFile
      # fetches that raw (non-templated) bundle.
      crdFile: manifests/charts/base/files/crd-all.gen.yaml

  - name: kubeedge
    alias: KubeEdge
    category: "Orchestration & Management"
    url: https://github.com/kubeedge/kubeedge
    extract: crd
    input:
      # KubeEdge CRDs are per-kind files under build/crds, organized in per-group
      # subdirs (devices/rules/apps/operations/policy/reliablesyncs); crdDir fetches
      # the tree recursively. The manifests/charts copies are a Helm duplicate.
      crdDir: build/crds

  - name: open-feature-operator
    alias: OpenFeature Operator
    category: "App Definition & Development"
    url: https://github.com/open-feature/open-feature-operator
    extract: crd
    input:
      # core.openfeature.dev CRDs (FeatureFlag, FeatureFlagSource, Flagd,
      # InProcessConfiguration, and the legacy *Configuration kinds) as per-kind
      # base files, no release asset.
      crdDir: config/crd/bases

  - name: openreports
    alias: OpenReports
    category: "Provisioning"
    url: https://github.com/openreports/reports-api
    extract: crd
    input:
      # openreports.io (Report, ClusterReport) — the successor to the
      # wg-policy PolicyReport API — as per-kind files under config/crd.
      crdDir: config/crd

  - name: rabbitmq-cluster-operator
    alias: RabbitMQ Cluster Operator
    category: "App Definition & Development"
    url: https://github.com/rabbitmq/cluster-operator
    extract: crd
    input:
      # cluster-operator.yml is the full install bundle; the extractor picks the
      # rabbitmq.com RabbitmqCluster CRD and drops the RBAC/Deployment docs.
      releaseAsset: cluster-operator.yml

  - name: redis-operator
    alias: Redis Operator
    category: "App Definition & Development"
    url: https://github.com/OT-CONTAINER-KIT/redis-operator
    extract: crd
    input:
      # redis.redis.opstreelabs.in (Redis, RedisCluster, RedisReplication,
      # RedisSentinel) as per-kind base files, no release asset.
      crdDir: config/crd/bases

  - name: scylla-operator
    alias: ScyllaDB Operator
    category: "App Definition & Development"
    url: https://github.com/scylladb/scylla-operator
    extract: crd
    input:
      # scylla.scylladb.com CRDs (ScyllaCluster, ScyllaDBDatacenter, NodeConfig,
      # ScyllaDBMonitoring, ScyllaDBManagerTask, …). The helm/deploy crds dirs are
      # symlinks (skipped by the tar extractor); the real generated files live per
      # version under pkg/api/scylla, which crdDir fetches recursively.
      crdDir: pkg/api/scylla

  - name: mariadb-operator
    alias: MariaDB Operator
    category: "App Definition & Development"
    url: https://github.com/mariadb-operator/mariadb-operator
    extract: crd
    input:
      # k8s.mariadb.com CRDs (MariaDB, MaxScale, Backup, Restore, Database, User,
      # Grant, Connection, SqlJob, PhysicalBackup, PointInTimeRecovery,
      # ExternalMariaDB). The repo interleaves four release lines per version
      # (bare, mariadb-operator-*, mariadb-cluster-*, mariadb-operator-crds-*);
      # only the crds line carries the crds.yaml CRD-only asset, so releaseTag
      # pins resolution to it.
      releaseTag: "mariadb-operator-crds-*"
      releaseAsset: crds.yaml

  - name: calico
    alias: Calico
    category: "Runtime"
    url: https://github.com/projectcalico/calico
    extract: crd
    input:
      # libcalico-go/config/crd co-locates a vendored policy.networking.k8s.io
      # ClusterNetworkPolicy already owned by the network-policy-api source, so
      # exclude it and keep only the crd.projectcalico.org CRDs.
      crdDir: libcalico-go/config/crd
      exclude:
        - policy.networking.k8s.io_*

  - name: tigera-operator
    alias: Tigera Operator
    category: "Runtime"
    url: https://github.com/projectcalico/calico
    extract: crd
    input:
      crdDir: charts/crd.projectcalico.org.v1/templates

  - name: antrea
    alias: Antrea
    category: "Runtime"
    url: https://github.com/antrea-io/antrea
    extract: crd
    input:
      # antrea-crds.yml is the CRD-only release asset (group crd.antrea.io); the
      # sibling antrea.yml is the full install bundle.
      releaseAsset: antrea-crds.yml

  - name: kubewarden
    alias: Kubewarden
    category: "Provisioning"
    url: https://github.com/kubewarden/kubewarden-controller
    extract: crd
    input:
      # policies.kubewarden.io CRDs (AdmissionPolicy, ClusterAdmissionPolicy,
      # PolicyServer, AdmissionPolicyGroup, ClusterAdmissionPolicyGroup) as raw
      # files in the chart's templates/crds subdir; the vendored wg-policy
      # PolicyReport CRDs sit one level up, so target the crds subdir.
      crdDir: charts/kubewarden-crds/templates/crds

  - name: kube-ovn
    alias: Kube-OVN
    category: "Runtime"
    url: https://github.com/kubeovn/kube-ovn
    extract: crd
    input:
      # kubeovn.io CRDs (Subnet, Vpc, VpcNatGateway, IP, ProviderNetwork, Vlan,
      # SecurityGroup, …) ship as one raw bundle in the v2 Helm chart's crds/ dir.
      crdFile: charts/kube-ovn-v2/crds/kube-ovn-crd.yaml

  # Submariner — multi-cluster networking. The operator repo ships the install
  # CRDs (Broker, ServiceDiscovery, Submariner); the main repo the runtime CRDs
  # (Cluster, Endpoint, Gateway, GlobalEgressIP, …). Both under submariner.io with
  # distinct kinds, as raw per-kind files under deploy/crds.
  - name: submariner-operator
    alias: Submariner Operator
    category: "Runtime"
    url: https://github.com/submariner-io/submariner-operator
    extract: crd
    input:
      crdDir: deploy/crds

  - name: submariner
    alias: Submariner
    category: "Runtime"
    url: https://github.com/submariner-io/submariner
    extract: crd
    input:
      crdDir: deploy/crds
