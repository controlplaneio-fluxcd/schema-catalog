      # (no kustomization), so crdDir fetches the tree directly.
      crdDir: charts/dapr/crds

  # KServe — ML model serving (group serving.kserve.io). config/crd/full is the
  # canonical CRD set (its kustomization aggregates the core kinds plus
  # clusterstoragecontainer, but not the newer llmisvc subdir), so the
  # LLMInferenceService CRDs come from a second source over that subdir.
  - name: kserve
    alias: KServe
    project: kserve
    url: https://github.com/kserve/kserve
    extract: crd
    input:
      # Bare CRD files under config/crd/full; crdDir instead of kustomize so
      # the fetch uses github.ts (kubectl kustomize's hard-coded 27s git
      # timeout trips on this large repo). The excludes keep the exact scope
      # of the full kustomization render: the conversion-webhook patches are
      # partial CRD docs with no schema, the llminferenceservice files belong
      # to the kserve-llmisvc source, and the alpha localmodel kinds are not
      # part of the upstream render.
      crdDir: config/crd/full
      exclude:
        - "*_patch.yaml"
        - "serving.kserve.io_llminferenceservice*"
        - "serving.kserve.io_localmodel*"

  - name: kserve-llmisvc
    alias: KServe LLM
    project: kserve
    url: https://github.com/kserve/kserve
    extract: crd
    input:
      # Same crdDir-over-kustomize trade as the kserve source. The excluded
      # conversion-webhook patches only add spec.conversion, which schema
      # extraction ignores.
      crdDir: config/crd/full/llmisvc
      exclude:
        - "*_patch.yaml"

