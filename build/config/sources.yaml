# Catalog sources for `bun src/main.ts build`, processed concurrently;
# results and reporting keep this order. Config format: see build/src/types.ts.
# Project groups: members reference these via `project:` and inherit the
# group's category/cncf; the web UI and MCP present each group as one project.
projects:
  - name: aws-ack
    alias: AWS Controllers for Kubernetes
    category: "Provisioning"
    url: https://github.com/aws-controllers-k8s

  - name: argo
    alias: Argo
    category: "App Definition & Development"
    cncf: graduated
    pin: 4
    url: https://github.com/argoproj

  - name: karpenter
    alias: Karpenter
    category: "Orchestration & Management"
    pin: 4
    url: https://github.com/kubernetes-sigs/karpenter

  - name: cluster-api
    alias: Cluster API
    category: "Provisioning"
    pin: 1
    url: https://github.com/kubernetes-sigs/cluster-api

  - name: kserve
    alias: KServe
    category: "App Definition & Development"
    cncf: incubating
    url: https://github.com/kserve/kserve

  - name: volcano
    alias: Volcano
    category: "Orchestration & Management"
    cncf: incubating
    url: https://github.com/volcano-sh/volcano

  - name: node-feature-discovery
    alias: Node Feature Discovery
    category: "Orchestration & Management"
    url: https://github.com/kubernetes-sigs/node-feature-discovery

  - name: submariner
    alias: Submariner
    category: "Runtime"
    cncf: sandbox
    url: https://github.com/submariner-io

  - name: calico
    alias: Calico
    category: "Runtime"
    pin: 2
    url: https://github.com/projectcalico/calico

  - name: knative
    alias: Knative
    category: "App Definition & Development"
    cncf: graduated
    pin: 5
    url: https://github.com/knative

sources:
  - name: kubernetes
    alias: Kubernetes
    category: "Platform"
    cncf: graduated
    pin: 1
    url: https://github.com/kubernetes/kubernetes
    extract: k8s

  - name: openshift
    alias: OpenShift
    category: "Platform"
    url: https://github.com/openshift/api
    extract: openshift

  - name: flux
    alias: Flux
    category: "App Definition & Development"
    cncf: graduated
    pin: 1
    url: https://github.com/fluxcd/flux2
    extract: crd
    input:
      fluxInstance:
        registry: ghcr.io/fluxcd
        components:
          - source-controller
          - source-watcher
          - kustomize-controller
          - helm-controller
          - notification-controller
          - image-reflector-controller
          - image-automation-controller

  - name: flagger
    alias: Flagger
    category: "App Definition & Development"
    cncf: graduated
    pin: 3
    url: https://github.com/fluxcd/flagger
    extract: crd
    input:
      kustomize: kustomize/kubernetes

  - name: flux-operator
    alias: Flux Operator
    category: "App Definition & Development"
    pin: 2
    url: https://github.com/controlplaneio-fluxcd/flux-operator
    extract: crd
    input:
      kustomize: config/crd

  - name: cluster-api
    alias: Cluster API
    project: cluster-api
    url: https://github.com/kubernetes-sigs/cluster-api
    extract: crd
    input:
      releaseAsset: cluster-api-components.yaml

  - name: cluster-api-operator
    alias: Cluster API Operator
    project: cluster-api
    url: https://github.com/kubernetes-sigs/cluster-api-operator
    extract: crd
    input:
      # operator.cluster.x-k8s.io provider-install CRDs (Core/Bootstrap/ControlPlane/
      # Infrastructure/Addon/IPAM/RuntimeExtension Provider); distinct group from the
      # core Cluster API CRDs. Per-kind base files, no release asset.
      crdDir: config/crd/bases

  - name: cluster-api-addon-provider-helm
    alias: Cluster API Add-on Provider Helm
    project: cluster-api
    url: https://github.com/kubernetes-sigs/cluster-api-addon-provider-helm
    extract: crd
    input:
      # addons.cluster.x-k8s.io HelmChartProxy + HelmReleaseProxy — the same group
      # as core Cluster API's ClusterResourceSet kinds but distinct kinds, so no
      # collision. Per-kind base files, no release asset.
      crdDir: config/crd/bases

  - name: cluster-api-provider-vsphere
    alias: Cluster API vSphere
    project: cluster-api
    url: https://github.com/kubernetes-sigs/cluster-api-provider-vsphere
    extract: crd
    input:
      # infrastructure.cluster.x-k8s.io VSphere* CRDs (Cluster, ClusterIdentity,
      # ClusterTemplate, DeploymentZone, FailureDomain, Machine, MachineTemplate,
      # VM) — the shared CAPI infra-provider group, distinct kinds from the other
      # providers. infrastructure-components.yaml is the full install bundle and
      # the extractor keeps the CRDs. (The vmware.infrastructure.* supervisor-mode
      # CRDs ship in a separate asset and are intentionally left out.)
      releaseAsset: infrastructure-components.yaml

  - name: cluster-api-provider-openstack
    alias: Cluster API OpenStack
    project: cluster-api
    url: https://github.com/kubernetes-sigs/cluster-api-provider-openstack
    extract: crd
    input:
      # infrastructure.cluster.x-k8s.io OpenStack* CRDs (Cluster, ClusterIdentity,
      # ClusterTemplate, FloatingIPPool, Machine, MachineTemplate, Server) — the
      # shared CAPI infra-provider group, distinct kinds from the other providers.
      # infrastructure-components.yaml is the full install bundle; extractor keeps
      # the CRDs.
      releaseAsset: infrastructure-components.yaml

  - name: cluster-api-provider-aws
    alias: Cluster API AWS
    project: cluster-api
    url: https://github.com/kubernetes-sigs/cluster-api-provider-aws
    extract: crd
    input:
      # infrastructure.cluster.x-k8s.io AWS*/ROSA* CRDs plus EKS/NodeAdm bootstrap
      # and AWSManaged*/ROSA* control-plane CRDs; provider-prefixed kinds avoid
      # collisions with core Cluster API and other infra providers.
      releaseAsset: infrastructure-components.yaml

  - name: gateway-api
    alias: Gateway API
    category: "Orchestration & Management"
    pin: 1
    url: https://github.com/kubernetes-sigs/gateway-api
    extract: crd
    input:
      # The experimental channel is a strict superset of the default (standard)
      # config/crd: same kinds and served versions, plus the experimental fields
      # implementations actually use (HTTPRoute timeouts/retry/cors/sessionPersistence,
      # GRPCRoute retry, …) and the two gateway.networking.x-k8s.io kinds
      # (XBackendTrafficPolicy, XMesh). Standard-only would falsely reject valid
      # manifests using those fields (Flagger canaries, Envoy Gateway, kgateway, Cilium).
      kustomize: config/crd/experimental

  - name: mcs-api
    alias: Multi-Cluster Services API
    category: "Runtime"
    url: https://github.com/kubernetes-sigs/mcs-api
    extract: crd
    input:
      # multicluster.x-k8s.io ServiceExport and ServiceImport ship as generated,
      # schema-bearing per-kind CRDs under config/crd (config/crd-base is schemaless).
      crdDir: config/crd

  - name: karmada
    alias: Karmada
    category: "Orchestration & Management"
    cncf: incubating
    url: https://github.com/karmada-io/karmada
    extract: crd
    input:
      # Per-kind CRD files in grouped subdirs; the sibling kustomization only
      # patches conversion webhooks. The vendored multicluster.x-k8s.io CRDs are
      # owned by mcs-api, which ships them as its own source.
      crdDir: charts/karmada/_crds/bases
      exclude:
        - multicluster.x-k8s.io_*

  - name: cert-manager
    alias: Cert Manager
    category: "Provisioning"
    cncf: graduated
    pin: 2
    url: https://github.com/cert-manager/cert-manager
    extract: crd
    input:
      releaseAsset: cert-manager.crds.yaml

  - name: trust-manager
    alias: Trust Manager
    category: "Provisioning"
    cncf: graduated
    url: https://github.com/cert-manager/trust-manager
    extract: crd
    input:
      # cert-manager's trust-manager ships no CRD release asset; the two CRDs
      # (group trust.cert-manager.io: Bundle, and trust-manager.io: ClusterBundle)
      # are bare files under deploy/crds — the helm-templated copies live under
      # deploy/charts, so crdDir fetches the plain deploy/crds tree.
      crdDir: deploy/crds

  - name: external-secrets
    alias: External Secrets
    category: "Provisioning"
    cncf: sandbox
    pin: 5
    url: https://github.com/external-secrets/external-secrets
    extract: crd
    input:
      # external-secrets interleaves helm-chart-* releases with the app v*
      # releases, so releaseTag pins version resolution to the app tags.
      releaseTag: "v*"
      releaseAsset: external-secrets.yaml

  - name: onepassword-operator
    alias: 1Password Operator
    category: "Provisioning"
    url: https://github.com/1Password/onepassword-operator
    extract: crd
    input:
      # onepassword.com (OnePasswordItem); the releases carry no assets, and the
      # single CRD is the only file under config/crd/bases (no kustomization),
      # so crdDir fetches the tree.
      crdDir: config/crd/bases

  - name: cilium
    alias: Cilium
    category: "Runtime"
    cncf: graduated
    pin: 1
    url: https://github.com/cilium/cilium
    extract: crd
    input:
      # cilium ships CRDs as bare per-kind YAML files (v2, v2alpha1) with no
      # release asset or kustomization, so crdDir fetches the tree directly.
      crdDir: pkg/k8s/apis/cilium.io/client/crds

  - name: tailscale
    alias: Tailscale
    category: "Runtime"
    url: https://github.com/tailscale/tailscale
    extract: crd
    input:
      # tailscale.com CRDs (Connector, DNSConfig, ProxyClass, ProxyGroup,
      # ProxyGroupPolicy, Recorder, Tailnet) ship as bare per-kind files under
      # the k8s-operator deploy dir with no release asset, so crdDir fetches
      # the tree.
      crdDir: cmd/k8s-operator/deploy/crds

  - name: prometheus-operator
    alias: Prometheus Operator
    category: "Observability & Analysis"
    cncf: graduated
    pin: 1
    url: https://github.com/prometheus-operator/prometheus-operator
    extract: crd
    input:
      releaseAsset: bundle.yaml

  - name: victoriametrics-operator
    alias: VictoriaMetrics Operator
    category: "Observability & Analysis"
    url: https://github.com/VictoriaMetrics/operator
    extract: crd
    input:
      releaseAsset: crd.yaml

  - name: fluent-operator
    alias: Fluent Operator
    category: "Observability & Analysis"
    cncf: graduated
    pin: 4
    url: https://github.com/fluent/fluent-operator
    extract: crd
    input:
      # fluent-operator ships one asset, setup.yaml, a full install bundle;
      # the extractor picks out the CRDs and drops the RBAC/Deployment docs.
      releaseAsset: setup.yaml

  - name: grafana-operator
    alias: Grafana Operator
    category: "Observability & Analysis"
    pin: 3
    url: https://github.com/grafana/grafana-operator
    extract: crd
    input:
      # grafana.integreatly.org CRDs (Grafana, GrafanaDashboard, GrafanaDatasource,
      # GrafanaFolder, GrafanaAlertRuleGroup, GrafanaContactPoint, and others).
      # crds.yaml is the CRD-only release asset.
      releaseAsset: crds.yaml

  - name: loki-operator
    alias: Loki Operator
    category: "Observability & Analysis"
    pin: 5
    url: https://github.com/grafana/loki
    extract: crd
    input:
      # loki.grafana.com CRDs (LokiStack, AlertingRule, RecordingRule,
      # RulerConfig) plus the operator's config.grafana.com ProjectConfig
      # component-config, as bare per-kind files under operator/config/crd/bases.
      # grafana/loki is a monorepo whose /releases/latest is the Loki app (v3.x),
      # so releaseTag pins resolution to the operator's own operator/v* line; the
      # resolved tag doubles as the git ref for the tree fetch.
      releaseTag: "operator/v*"
      crdDir: operator/config/crd/bases

  - name: perses-operator
    alias: Perses Operator
    category: "Observability & Analysis"
    cncf: sandbox
    url: https://github.com/perses/perses-operator
    extract: crd
    input:
      # perses.dev CRDs (Perses, PersesDashboard, PersesDatasource,
      # PersesGlobalDatasource). No CRD release asset (only operator binaries);
      # the CRDs are bare per-kind files under config/crd/bases (the kustomization
      # and patches are siblings, not in bases), so crdDir fetches the tree.
      crdDir: config/crd/bases

  - name: opensearch-operator
    alias: OpenSearch Operator
    category: "Observability & Analysis"
    url: https://github.com/opensearch-project/opensearch-k8s-operator
    extract: crd
    input:
      # Two API groups: the current opensearch.org and the legacy
      # opensearch.opster.io (OpenSearchCluster, OpenSearchUser, OpenSearchRole,
      # and index/template/policy kinds), as bare per-kind files under the
      # operator subdir's config/crd/bases. The dir also vendors a
      # monitoring.coreos.com ServiceMonitor CRD already owned by the
      # prometheus-operator source, so exclude it. The repo interleaves
      # opensearch-cluster-* and a mistagged v3.0.0-alpha that /releases/latest
      # would surface, so releaseTag pins resolution to the operator line.
      releaseTag: "opensearch-operator-*"
      crdDir: opensearch-operator/config/crd/bases
      exclude:
        - crd-servicemonitor.yaml

  - name: jaeger-operator
    alias: Jaeger Operator
    category: "Observability & Analysis"
    cncf: graduated
    url: https://github.com/jaegertracing/jaeger-operator
    extract: crd
    input:
      # The jaegertracing.io Jaeger CRD. jaeger-operator.yaml is the full
      # install bundle; the extractor picks out the CRD and drops the
      # RBAC/Deployment docs.
      releaseAsset: jaeger-operator.yaml

  - name: tempo-operator
    alias: Tempo Operator
    category: "Observability & Analysis"
    url: https://github.com/grafana/tempo-operator
    extract: crd
    input:
      # tempo.grafana.com CRDs (TempoStack, TempoMonolithic).
      # tempo-operator.yaml is the full install bundle; the extractor picks
      # out the CRDs and drops the RBAC/Deployment docs.
      releaseAsset: tempo-operator.yaml

  - name: logging-operator
    alias: Logging Operator
    category: "Observability & Analysis"
    cncf: sandbox
    url: https://github.com/kube-logging/logging-operator
    extract: crd
    input:
      # logging.banzaicloud.io and logging-extensions.banzaicloud.io CRDs
      # (Logging, Flow, Output, their cluster variants, and the syslog-ng
      # kinds). The chart copies are Helm-templated, so crdDir fetches the
      # bare per-kind files under config/crd/bases. Releases use bare tags
      # (6.7.0, no v).
      crdDir: config/crd/bases

  - name: datadog-operator
    alias: Datadog Operator
    category: "Observability & Analysis"
    url: https://github.com/DataDog/datadog-operator
    extract: crd
    input:
      # datadoghq.com CRDs (DatadogAgent, DatadogMonitor, DatadogSLO,
      # DatadogPodAutoscaler and others). Release assets are kubectl plugin
      # binaries only, so crdDir fetches the bare per-kind files under
      # config/crd/bases/v1.
      crdDir: config/crd/bases/v1

  - name: litmus
    alias: Litmus
    category: "Observability & Analysis"
    cncf: incubating
    url: https://github.com/litmuschaos/chaos-operator
    extract: crd
    input:
      # litmuschaos.io CRDs (ChaosEngine, ChaosExperiment, ChaosResult). The
      # chaos-operator repo owns the CRDs and releases in lockstep with Litmus;
      # no CRD release asset, so crdDir fetches the bare per-kind files under
      # deploy/crds, the hand-written set the Litmus install actually deploys.
      # The kubebuilder-generated config/crd/bases copy is over-strict: it
      # requires spec.components and rejects the canonical docs examples.
      # Releases use bare tags (3.30.0, no v).
      crdDir: deploy/crds

  - name: keda
    alias: KEDA
    category: "Orchestration & Management"
    cncf: graduated
    pin: 3
    url: https://github.com/kedacore/keda
    extract: crd
    input:
      # keda's CRD asset embeds the version in its name (keda-<ver>-crds.yaml),
      # so a glob selects it independent of the resolved release.
      releaseAsset: "keda-*-crds.yaml"

  - name: knative-serving
    alias: Knative Serving
    project: knative
    url: https://github.com/knative/serving
    extract: crd
    input:
      releaseAsset: serving-crds.yaml

  - name: knative-eventing
    alias: Knative Eventing
    project: knative
    url: https://github.com/knative/eventing
    extract: crd
    input:
      releaseAsset: eventing-crds.yaml

  - name: tekton-pipeline
    alias: Tekton Pipeline
    category: "App Definition & Development"
    url: https://github.com/tektoncd/pipeline
    extract: crd
    input:
      # tekton ships no CRD-only asset; release.yaml is the full install
      # bundle and the extractor picks out the CRDs. (Triggers/Chains are
      # skipped: Triggers' CRDs are preserve-unknown stubs, Chains has none.)
      releaseAsset: release.yaml

  - name: actions-runner-controller
    alias: Actions Runner Controller
    category: "App Definition & Development"
    url: https://github.com/actions/actions-runner-controller
    extract: crd
    input:
      # GitHub's self-hosted runner operator. Two API groups: the current
      # actions.github.com (AutoscalingRunnerSet, AutoscalingListener,
      # EphemeralRunner, EphemeralRunnerSet) and the legacy actions.summerwind.dev
      # (Runner, RunnerDeployment, RunnerReplicaSet, RunnerSet,
      # HorizontalRunnerAutoscaler). Both ship as bare per-kind files under
      # config/crd/bases (the kustomization and patches are siblings, not in
      # bases), so crdDir fetches the tree. Releases are the gha-runner-scale-set-*
      # line, which /releases/latest resolves to and doubles as the git ref.
      crdDir: config/crd/bases

  - name: kyverno
    alias: Kyverno
    category: "Provisioning"
    cncf: graduated
    pin: 4
    url: https://github.com/kyverno/kyverno
    extract: crd
    input:
      # kyverno ships only per-CRD assets (no single CRD bundle), so install.yaml
      # is the one asset carrying every CRD; the extractor drops the non-CRD docs.
      releaseAsset: install.yaml

  - name: sigstore-policy-controller
    alias: Sigstore Policy Controller
    category: "Provisioning"
    url: https://github.com/sigstore/policy-controller
    extract: crd
    input:
      # policy.sigstore.dev CRDs (ClusterImagePolicy, TrustRoot). No CRD-only
      # asset; the config dir's kustomization renders the full install bundle
      # and the extractor picks out the CRDs, dropping the RBAC/webhook/config
      # docs.
      kustomize: config

  - name: falco-operator
    alias: Falco Operator
    category: "Provisioning"
    cncf: graduated
    url: https://github.com/falcosecurity/falco-operator
    extract: crd
    input:
      # instance.falcosecurity.dev (Falco, Component) and
      # artifact.falcosecurity.dev (Config, Plugin, Rulesfile) CRDs.
      # install.yaml is the full install bundle; the extractor picks out the
      # CRDs and drops the RBAC/Deployment docs.
      releaseAsset: install.yaml

  - name: kubescape-operator
    alias: Kubescape Operator
    category: "Provisioning"
    cncf: incubating
    url: https://github.com/kubescape/helm-charts
    extract: crd
    input:
      # kubescape.io CRDs (SecurityException, ClusterSecurityException, Rules,
      # OperatorCommand) as bare files under the operator chart's crds dir,
      # the untemplated Helm convention. The CRDs ship with the chart, so the
      # recorded version is the chart tag; releaseTag pins resolution to the
      # kubescape-operator-* line and the resolved tag doubles as the git ref.
      releaseTag: "kubescape-operator-*"
      crdDir: charts/kubescape-operator/crds

  - name: rook
    alias: Rook
    category: "Runtime"
    cncf: graduated
    pin: 4
    url: https://github.com/rook/rook
    extract: crd
    input:
      # rook publishes no release assets; its whole CRD set is one committed file
      # that shares deploy/examples with ~99 unrelated manifests, so crdFile
      # fetches just that bundle.
      crdFile: deploy/examples/crds.yaml

  - name: vitess-operator
    alias: Vitess Operator
    category: "App Definition & Development"
    cncf: graduated
    url: https://github.com/planetscale/vitess-operator
    extract: crd
    input:
      # vitess CRDs live in the operator repo as bare per-kind files with no
      # release asset, so crdDir fetches the tree directly.
      crdDir: deploy/crds

  - name: strimzi
    alias: Strimzi
    category: "App Definition & Development"
    cncf: incubating
    url: https://github.com/strimzi/strimzi-kafka-operator
    extract: crd
    input:
      # strimzi maintains two concurrent lines: 0.x still serves both v1beta2
      # (what essentially every real manifest uses) and v1, while the newer 1.x
      # serves v1 only. Pin to 0.x for the wider coverage, and so neither line
      # regresses the other via GitHub's /releases/latest. The CRD asset embeds
      # the version, hence the glob.
      releaseTag: "0.*"
      releaseAsset: "strimzi-crds-*.yaml"

  - name: nats
    alias: NATS
    category: "App Definition & Development"
    cncf: incubating
    url: https://github.com/nats-io/nack
    extract: crd
    input:
      # NATS CRDs (JetStream) ship from nack, the NATS Controllers for
      # Kubernetes; nats-operator is deprecated. crds.yml is the CRD-only asset.
      releaseAsset: crds.yml

  - name: opentelemetry
    alias: OpenTelemetry
    category: "Observability & Analysis"
    cncf: graduated
    pin: 2
    url: https://github.com/open-telemetry/opentelemetry-operator
    extract: crd
    input:
      # No CRD-only asset; opentelemetry-operator.yaml is the full install
      # bundle and the extractor picks out the CRDs. (Descriptions are sparse
      # upstream — the collector config is a preserve-unknown-fields map.)
      releaseAsset: opentelemetry-operator.yaml

  - name: gatekeeper
    alias: OPA Gatekeeper
    category: "Provisioning"
    cncf: graduated
    url: https://github.com/open-policy-agent/gatekeeper
    extract: crd
    input:
      # gatekeeper's releases ship only the gator CLI; the CRDs are bare
      # per-kind files in the Helm chart, so crdDir fetches that tree. (Only
      # the framework CRDs are here; per-constraint kinds are generated at
      # runtime from ConstraintTemplates and cannot be catalogued.)
      crdDir: charts/gatekeeper/crds

  - name: envoy-gateway
    alias: Envoy Gateway
    category: "Orchestration & Management"
    cncf: graduated
    url: https://github.com/envoyproxy/gateway
    extract: crd
    input:
      # envoy-gateway-crds.yaml carries only the gateway.envoyproxy.io policy
      # CRDs (no Gateway API CRDs, so no collision with the gateway-api source).
      releaseAsset: envoy-gateway-crds.yaml

  - name: kgateway
    alias: kgateway
    category: "Orchestration & Management"
    cncf: sandbox
    url: https://github.com/kgateway-dev/kgateway
    extract: crd
    input:
      # gateway.kgateway.dev CRDs (Backend, BackendConfigPolicy, TrafficPolicy,
      # HTTPListenerPolicy, ListenerPolicy, GatewayExtension, GatewayParameters,
      # DirectResponse). No CRD release asset; the CRD-only Helm chart ships them
      # as plain (non-templated) files under its templates dir, so crdDir fetches
      # the tree (the sibling NOTES.txt is skipped by the extractor). The Gateway
      # API TCPRoute vendored under pkg/kgateway/crds is intentionally left to the
      # gateway-api source.
      crdDir: install/helm/kgateway-crds/templates

  - name: longhorn
    alias: Longhorn
    category: "Runtime"
    cncf: incubating
    pin: 3
    url: https://github.com/longhorn/longhorn
    extract: crd
    input:
      # longhorn.yaml is the full install bundle; the extractor picks out the
      # 23 longhorn.io CRDs and drops the RBAC/Deployment/DaemonSet docs.
      releaseAsset: longhorn.yaml

  - name: vertical-pod-autoscaler
    alias: Vertical Pod Autoscaler
    category: "Orchestration & Management"
    url: https://github.com/kubernetes/autoscaler
    extract: crd
    input:
      # kubernetes/autoscaler is a monorepo whose /releases/latest is whatever
      # component shipped last (usually cluster-autoscaler). releaseTag pins
      # resolution to VPA's own tags; the wildcard-must-be-a-version rule keeps
      # the vertical-pod-autoscaler-chart-* helm tags from matching. The
      # resolved tag doubles as the crdFile git ref.
      releaseTag: "vertical-pod-autoscaler-*"
      crdFile: vertical-pod-autoscaler/deploy/vpa-v1-crd-gen.yaml

  - name: kueue
    alias: Kueue
    category: "Orchestration & Management"
    pin: 5
    url: https://github.com/kubernetes-sigs/kueue
    extract: crd
    input:
      # manifests.yaml is the full install bundle; the extractor picks out the
      # kueue.x-k8s.io CRDs and drops the non-CRD docs.
      releaseAsset: manifests.yaml

  - name: cloudnative-pg
    alias: CloudNativePG
    category: "App Definition & Development"
    cncf: sandbox
