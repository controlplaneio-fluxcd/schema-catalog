      # the tree recursively. The manifests/charts copies are a Helm duplicate.
      crdDir: build/crds

  - name: open-feature-operator
    alias: OpenFeature Operator
    category: "App Definition & Development"
    cncf: incubating
    url: https://github.com/open-feature/open-feature-operator
    extract: crd
    input:
      # core.openfeature.dev CRDs (FeatureFlag, FeatureFlagSource, Flagd,
      # InProcessConfiguration, and the legacy *Configuration kinds) as per-kind
      # base files, no release asset.
      crdDir: config/crd/bases

  - name: openreports
    alias: OpenReports
    category: "Provisioning"
    url: https://github.com/openreports/reports-api
    extract: crd
    input:
      # openreports.io (Report, ClusterReport) — the successor to the
      # wg-policy PolicyReport API — as per-kind files under config/crd.
      crdDir: config/crd

  - name: rabbitmq-cluster-operator
    alias: RabbitMQ Cluster Operator
    category: "App Definition & Development"
    url: https://github.com/rabbitmq/cluster-operator
    extract: crd
    input:
      # cluster-operator.yml is the full install bundle; the extractor picks the
      # rabbitmq.com RabbitmqCluster CRD and drops the RBAC/Deployment docs.
      releaseAsset: cluster-operator.yml

  - name: redis-operator
    alias: Redis Operator
    category: "App Definition & Development"
    url: https://github.com/OT-CONTAINER-KIT/redis-operator
    extract: crd
    input:
      # redis.redis.opstreelabs.in (Redis, RedisCluster, RedisReplication,
      # RedisSentinel) as per-kind base files, no release asset.
      crdDir: config/crd/bases

  - name: scylla-operator
    alias: ScyllaDB Operator
    category: "App Definition & Development"
    url: https://github.com/scylladb/scylla-operator
    extract: crd
    input:
      # scylla.scylladb.com CRDs (ScyllaCluster, ScyllaDBDatacenter, NodeConfig,
      # ScyllaDBMonitoring, ScyllaDBManagerTask, …). The helm/deploy crds dirs are
      # symlinks (skipped by the tar extractor); the real generated files live per
      # version under pkg/api/scylla, which crdDir fetches recursively.
      crdDir: pkg/api/scylla

  - name: mariadb-operator
    alias: MariaDB Operator
    category: "App Definition & Development"
    url: https://github.com/mariadb-operator/mariadb-operator
    extract: crd
    input:
      # k8s.mariadb.com CRDs (MariaDB, MaxScale, Backup, Restore, Database, User,
      # Grant, Connection, SqlJob, PhysicalBackup, PointInTimeRecovery,
      # ExternalMariaDB). The repo interleaves four release lines per version
      # (bare, mariadb-operator-*, mariadb-cluster-*, mariadb-operator-crds-*);
      # only the crds line carries the crds.yaml CRD-only asset, so releaseTag
      # pins resolution to it.
      releaseTag: "mariadb-operator-crds-*"
      releaseAsset: crds.yaml

  - name: eck-operator
    alias: Elastic Cloud
    category: "Observability & Analysis"
    url: https://github.com/elastic/cloud-on-k8s
    extract: crd
    input:
      # ECK's 12 *.k8s.elastic.co CRDs (Elasticsearch, Kibana, ApmServer, Beat,
      # Agent, Logstash, EnterpriseSearch, ElasticMapsServer, ElasticsearchAutoscaler,
      # AutoOpsAgentPolicy, PackageRegistry, StackConfigPolicy) ship no release
      # asset; all-crds.yaml is the generated bundle sharing config/crds/v1 with
      # the per-kind resources/ and patches/ subdirs, so crdFile targets it.
      crdFile: config/crds/v1/all-crds.yaml

  - name: calico
    alias: Calico
    project: calico
    url: https://github.com/projectcalico/calico
    extract: crd
    input:
      # libcalico-go/config/crd co-locates a vendored policy.networking.k8s.io
      # ClusterNetworkPolicy already owned by the network-policy-api source, so
      # exclude it and keep only the crd.projectcalico.org CRDs.
      crdDir: libcalico-go/config/crd
      exclude:
        - policy.networking.k8s.io_*

  - name: tigera-operator
    alias: Tigera Operator
    project: calico
    url: https://github.com/projectcalico/calico
    extract: crd
    input:
      crdDir: charts/crd.projectcalico.org.v1/templates

  - name: antrea
    alias: Antrea
    category: "Runtime"
    cncf: sandbox
    url: https://github.com/antrea-io/antrea
    extract: crd
    input:
      # antrea-crds.yml is the CRD-only release asset (group crd.antrea.io); the
      # sibling antrea.yml is the full install bundle.
      releaseAsset: antrea-crds.yml

  - name: kubewarden
    alias: Kubewarden
    category: "Provisioning"
    cncf: sandbox
    url: https://github.com/kubewarden/kubewarden-controller
    extract: crd
    input:
      # policies.kubewarden.io CRDs (AdmissionPolicy, ClusterAdmissionPolicy,
      # PolicyServer, AdmissionPolicyGroup, ClusterAdmissionPolicyGroup) as raw
      # files in the chart's templates/crds subdir; the vendored wg-policy
      # PolicyReport CRDs sit one level up, so target the crds subdir.
      crdDir: charts/kubewarden-crds/templates/crds

  - name: kube-ovn
    alias: Kube-OVN
    category: "Runtime"
    cncf: sandbox
    url: https://github.com/kubeovn/kube-ovn
    extract: crd
    input:
      # kubeovn.io CRDs (Subnet, Vpc, VpcNatGateway, IP, ProviderNetwork, Vlan,
      # SecurityGroup, …) ship as one raw bundle in the v2 Helm chart's crds/ dir.
      crdFile: charts/kube-ovn-v2/crds/kube-ovn-crd.yaml

  # Submariner — multi-cluster networking. The operator repo ships the install
  # CRDs (Broker, ServiceDiscovery, Submariner); the main repo the runtime CRDs
  # (Cluster, Endpoint, Gateway, GlobalEgressIP, …). Both under submariner.io with
  # distinct kinds, as raw per-kind files under deploy/crds.
  - name: submariner-operator
    alias: Submariner Operator
    project: submariner
    url: https://github.com/submariner-io/submariner-operator
    extract: crd
    input:
      crdDir: deploy/crds

  - name: submariner
    alias: Submariner
    project: submariner
    url: https://github.com/submariner-io/submariner
    extract: crd
    input:
      crdDir: deploy/crds
