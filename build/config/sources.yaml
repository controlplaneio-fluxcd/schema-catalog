# Catalog sources for `bun src/main.ts build`, processed concurrently;
# results and reporting keep this order. Config format: see build/src/types.ts.
# Project groups: members reference these via `project:` and inherit the
# group's category/cncf; the web UI and MCP present each group as one project.
projects:
  - name: argo
    alias: Argo
    category: "App Definition & Development"
    cncf: graduated
    pin: 4
    url: https://github.com/argoproj

  - name: aws-ack
    alias: AWS Controllers for Kubernetes
    category: "Provisioning"
    url: https://github.com/aws-controllers-k8s

  - name: calico
    alias: Calico
    category: "Runtime"
    pin: 2
    url: https://github.com/projectcalico/calico

  - name: cluster-api
    alias: Cluster API
    category: "Provisioning"
    pin: 1
    url: https://github.com/kubernetes-sigs/cluster-api

  - name: karpenter
    alias: Karpenter
    category: "Orchestration & Management"
    pin: 4
    url: https://github.com/kubernetes-sigs/karpenter

  - name: knative
    alias: Knative
    category: "App Definition & Development"
    cncf: graduated
    pin: 5
    url: https://github.com/knative

  - name: kserve
    alias: KServe
    category: "App Definition & Development"
    cncf: incubating
    url: https://github.com/kserve/kserve

  - name: kubeflow
    alias: Kubeflow
    category: "App Definition & Development"
    cncf: incubating
    url: https://github.com/kubeflow

  - name: node-feature-discovery
    alias: Node Feature Discovery
    category: "Orchestration & Management"
    url: https://github.com/kubernetes-sigs/node-feature-discovery

  - name: submariner
    alias: Submariner
    category: "Runtime"
    cncf: sandbox
    url: https://github.com/submariner-io

  - name: volcano
    alias: Volcano
    category: "Orchestration & Management"
    cncf: incubating
    url: https://github.com/volcano-sh/volcano

sources:
  # ===== Platform =====

  - name: kubernetes
    alias: Kubernetes
    category: "Platform"
    cncf: graduated
    pin: 1
    url: https://github.com/kubernetes/kubernetes
    extract: k8s

  - name: openshift
    alias: OpenShift
    category: "Platform"
    url: https://github.com/openshift/api
    extract: openshift

  # ===== App Definition & Development =====

  - name: actions-runner-controller
    alias: Actions Runner Controller
    category: "App Definition & Development"
    url: https://github.com/actions/actions-runner-controller
    extract: crd
    input:
      # GitHub runner operator ships current and legacy CRDs as bare files;
      # the sibling kustomization and patches are outside bases. Releases are
      # gha-runner-scale-set-* and double as the git ref.
      crdDir: config/crd/bases

  - name: aibrix
    alias: AIBrix
    category: "App Definition & Development"
    url: https://github.com/vllm-project/aibrix
    extract: crd
    input:
      # The CRD-only asset embeds the version, so use a glob.
      releaseAsset: "aibrix-core-crds-*.yaml"

  # Argo: separate repos share argoproj.io but ship distinct kinds. Each CRD
  # dir has a self-contained kustomization, so render each member directly.
  - name: argo-cd
    alias: Argo CD
    project: argo
    url: https://github.com/argoproj/argo-cd
    extract: crd
    input:
      kustomize: manifests/crds

  - name: argo-rollouts
    alias: Argo Rollouts
    project: argo
    url: https://github.com/argoproj/argo-rollouts
    extract: crd
    input:
      kustomize: manifests/crds

  - name: argo-workflows
    alias: Argo Workflows
    project: argo
    url: https://github.com/argoproj/argo-workflows
    extract: crd
    input:
      # Use the full overlay: the minimal sibling has preserve-unknown stubs.
      kustomize: manifests/base/crds/full

  - name: argo-events
    alias: Argo Events
    project: argo
    url: https://github.com/argoproj/argo-events
    extract: crd
    input:
      kustomize: manifests/base/crds

  - name: cloudnative-pg
    alias: CloudNativePG
    category: "App Definition & Development"
    cncf: sandbox
    url: https://github.com/cloudnative-pg/cloudnative-pg
    extract: crd
    input:
      # The install bundle embeds the version, so use a glob.
      releaseAsset: "cnpg-*.yaml"

  - name: crunchy-postgres-operator
    alias: Crunchy Postgres Operator
    category: "App Definition & Development"
    url: https://github.com/CrunchyData/postgres-operator
    extract: crd
    input:
      crdDir: config/crd/bases

  - name: dapr
    alias: Dapr
    category: "App Definition & Development"
    cncf: graduated
    url: https://github.com/dapr/dapr
    extract: crd
    input:
      # Raw Helm chart CRDs, no kustomization.
      crdDir: charts/dapr/crds

  - name: flagger
    alias: Flagger
    category: "App Definition & Development"
    cncf: graduated
    pin: 3
    url: https://github.com/fluxcd/flagger
    extract: crd
    input:
      kustomize: kustomize/kubernetes

  - name: flux
    alias: Flux
    category: "App Definition & Development"
    cncf: graduated
    pin: 1
    url: https://github.com/fluxcd/flux2
    extract: crd
    input:
      fluxInstance:
        registry: ghcr.io/fluxcd
        components:
          - source-controller
          - source-watcher
          - kustomize-controller
          - helm-controller
          - notification-controller
          - image-reflector-controller
          - image-automation-controller

  - name: flux-operator
    alias: Flux Operator
    category: "App Definition & Development"
    pin: 2
    url: https://github.com/controlplaneio-fluxcd/flux-operator
    extract: crd
    input:
      kustomize: config/crd

  - name: k3s-helm-controller
    alias: k3s Helm Controller
    category: "App Definition & Development"
    url: https://github.com/k3s-io/helm-controller
    extract: crd
    input:
      crdDir: pkg/crds/yaml/generated

  - name: kargo
    alias: Kargo
    category: "App Definition & Development"
    url: https://github.com/akuity/kargo
    extract: crd
    input:
      # No CRD release asset; use the bare Helm resources CRD dir, not the
      # templated crds.yaml under templates/.
      crdDir: charts/kargo/resources/crds

  - name: knative-serving
    alias: Knative Serving
    project: knative
    url: https://github.com/knative/serving
    extract: crd
    input:
      releaseAsset: serving-crds.yaml

  - name: knative-eventing
    alias: Knative Eventing
    project: knative
    url: https://github.com/knative/eventing
    extract: crd
    input:
      releaseAsset: eventing-crds.yaml

  # KServe: config/crd/full is canonical but omits the newer llmisvc subdir,
  # so LLMInferenceService is pulled as a second source.
  - name: kserve
    alias: KServe
    project: kserve
    url: https://github.com/kserve/kserve
    extract: crd
    input:
      # Use crdDir instead of kustomize because kubectl kustomize times out on
      # this large repo. Excludes mirror the full render scope and leave llmisvc
      # to the dedicated source.
      crdDir: config/crd/full
      exclude:
        - "*_patch.yaml"
        - "serving.kserve.io_llminferenceservice*"
        - "serving.kserve.io_localmodel*"

  - name: kserve-llmisvc
    alias: KServe LLM
    project: kserve
    url: https://github.com/kserve/kserve
    extract: crd
    input:
      # Same crdDir-over-kustomize trade as the main KServe source; exclude
      # conversion-webhook patches that only add spec.conversion.
      crdDir: config/crd/full/llmisvc
      exclude:
        - "*_patch.yaml"

  # Kubeflow: controller repos own distinct APIs, so no collision excludes are
  # needed.
  - name: kubeflow-trainer
    alias: Kubeflow Trainer
    project: kubeflow
    url: https://github.com/kubeflow/trainer
    extract: crd
    input:
      crdDir: charts/kubeflow-trainer/crds

  - name: kubeflow-pipelines
    alias: Kubeflow Pipelines
    project: kubeflow
    url: https://github.com/kubeflow/pipelines
    extract: crd
    input:
      crdDir: manifests/kustomize/base/crds

  - name: mpi-operator
    alias: MPI Operator
    project: kubeflow
    url: https://github.com/kubeflow/mpi-operator
    extract: crd
    input:
      crdFile: manifests/base/kubeflow.org_mpijobs.yaml

  - name: spark-operator
    alias: Spark Operator
    project: kubeflow
    url: https://github.com/kubeflow/spark-operator
    extract: crd
    input:
      crdDir: charts/spark-operator-chart/crds

  - name: notebook-controller
    alias: Kubeflow Notebooks
    project: kubeflow
    url: https://github.com/kubeflow/notebooks
    extract: crd
    input:
      crdDir: components/notebook-controller/config/crd/bases

  - name: poddefaults-webhook
    alias: Kubeflow PodDefaults
    project: kubeflow
    url: https://github.com/kubeflow/dashboard
    extract: crd
    input:
      crdFile: components/poddefaults-webhooks/manifests/kustomize/base/crd.yaml

  - name: profile-controller
    alias: Kubeflow Profiles
    project: kubeflow
    url: https://github.com/kubeflow/dashboard
    extract: crd
    input:
      # The CRD dir also holds partial kustomize *_patch.yaml docs, so target
      # the one complete CRD file.
      crdFile: components/profile-controller/manifests/kustomize/base/crd/kubeflow.org_profiles.yaml

  - name: pvcviewer-controller
    alias: Kubeflow PVCViewer
    project: kubeflow
    url: https://github.com/kubeflow/notebooks
    extract: crd
    input:
      crdDir: components/pvcviewer-controller/config/crd/bases

  - name: tensorboard-controller
    alias: Kubeflow Tensorboard
    project: kubeflow
    url: https://github.com/kubeflow/notebooks
    extract: crd
    input:
      crdDir: components/tensorboard-controller/config/crd/bases

  - name: mariadb-operator
    alias: MariaDB Operator
    category: "App Definition & Development"
    url: https://github.com/mariadb-operator/mariadb-operator
    extract: crd
    input:
      # The repo interleaves four release lines per version; only
      # mariadb-operator-crds-* carries the CRD-only asset.
      releaseTag: "mariadb-operator-crds-*"
      releaseAsset: crds.yaml

  - name: nats
    alias: NATS
    category: "App Definition & Development"
    cncf: incubating
    url: https://github.com/nats-io/nack
    extract: crd
    input:
      # CRDs ship from nack; nats-operator is deprecated. crds.yml is CRD-only.
      releaseAsset: crds.yml

  - name: open-feature-operator
    alias: OpenFeature Operator
    category: "App Definition & Development"
    cncf: incubating
    url: https://github.com/open-feature/open-feature-operator
    extract: crd
    input:
      crdDir: config/crd/bases

  - name: openkruise
    alias: OpenKruise
    category: "App Definition & Development"
    cncf: incubating
    url: https://github.com/openkruise/kruise
    extract: crd
    input:
      crdDir: config/crd/bases

  - name: rabbitmq-cluster-operator
    alias: RabbitMQ Cluster Operator
    category: "App Definition & Development"
    url: https://github.com/rabbitmq/cluster-operator
    extract: crd
    input:
      releaseAsset: cluster-operator.yml

  - name: rancher-fleet
    alias: Rancher Fleet
    category: "App Definition & Development"
    url: https://github.com/rancher/fleet
    extract: crd
    input:
      # CRDs ship pre-rendered in the fleet-crd chart.
      crdFile: charts/fleet-crd/templates/crds.yaml

  - name: redis-operator
    alias: Redis Operator
    category: "App Definition & Development"
    url: https://github.com/OT-CONTAINER-KIT/redis-operator
    extract: crd
    input:
      crdDir: config/crd/bases

  - name: renovate-operator
    alias: Renovate Operator
    category: "App Definition & Development"
    url: https://github.com/mogenius/renovate-operator
    extract: crd
    input:
      # No CRD release asset; the Helm chart keeps the plain CRD out of
      # templates/ and inlines it from crd/ at install time.
      crdDir: charts/renovate-operator/crd

  - name: scylla-operator
    alias: ScyllaDB Operator
    category: "App Definition & Development"
    url: https://github.com/scylladb/scylla-operator
    extract: crd
    input:
      # Helm and deploy CRD dirs are symlinks skipped by the tar extractor;
      # the real generated files live under pkg/api/scylla.
      crdDir: pkg/api/scylla

  - name: seldon-core
    alias: Seldon Core v2
    category: "App Definition & Development"
    url: https://github.com/SeldonIO/seldon-core
    extract: crd
    input:
      releaseAsset: crds.yaml

  - name: strimzi
    alias: Strimzi
    category: "App Definition & Development"
    cncf: incubating
    url: https://github.com/strimzi/strimzi-kafka-operator
    extract: crd
    input:
      # Pin 0.x for wider v1beta2 coverage; 1.x serves v1 only. The CRD asset
      # embeds the version, hence the glob.
      releaseTag: "0.*"
      releaseAsset: "strimzi-crds-*.yaml"

  - name: tekton-pipeline
    alias: Tekton Pipeline
    category: "App Definition & Development"
    url: https://github.com/tektoncd/pipeline
    extract: crd
    input:
      # No CRD-only asset; use the full install bundle. Triggers CRDs are
      # preserve-unknown stubs and Chains has none.
      releaseAsset: release.yaml

  - name: vitess-operator
    alias: Vitess Operator
    category: "App Definition & Development"
    cncf: graduated
    url: https://github.com/planetscale/vitess-operator
    extract: crd
    input:
      # Bare per-kind CRDs with no release asset.
      crdDir: deploy/crds

  # ===== Orchestration & Management =====

  - name: agentgateway
    alias: Agentgateway
    category: "Orchestration & Management"
    url: https://github.com/agentgateway/agentgateway
    extract: crd
    input:
      # No CRD release asset; use the CRD-only Helm chart plain templates.
      crdDir: controller/install/helm/agentgateway-crds/templates

  - name: aws-load-balancer-controller
    alias: AWS Load Balancer Controller
    category: "Orchestration & Management"
    url: https://github.com/kubernetes-sigs/aws-load-balancer-controller
    extract: crd
    input:
      # The Helm crds dir has two CRD bundles, but its kustomization lists only
      # one, so crdDir picks up both bundles.
      crdDir: helm/aws-load-balancer-controller/crds

  - name: cluster-inventory-api
    alias: Cluster Inventory API
    category: "Orchestration & Management"
    url: https://github.com/kubernetes-sigs/cluster-inventory-api
    extract: crd
    input:
      crdDir: config/crd/bases

  - name: envoy-gateway
    alias: Envoy Gateway
    category: "Orchestration & Management"
    cncf: graduated
    url: https://github.com/envoyproxy/gateway
    extract: crd
    input:
      # CRD-only asset excludes Gateway API CRDs, avoiding source collisions.
      releaseAsset: envoy-gateway-crds.yaml

  - name: external-dns
    alias: ExternalDNS
    category: "Orchestration & Management"
    url: https://github.com/kubernetes-sigs/external-dns
    extract: crd
    input:
      # Single CRD file under config/crd/standard, no kustomization.
      crdDir: config/crd/standard

  - name: gateway-api
    alias: Gateway API
    category: "Orchestration & Management"
    pin: 1
    url: https://github.com/kubernetes-sigs/gateway-api
    extract: crd
    input:
      # Use experimental: it is a strict superset of standard and includes fields
      # real implementations use. Standard-only would reject valid manifests.
      kustomize: config/crd/experimental

  - name: gateway-api-inference-extension
    alias: Gateway API Inference Extension
    category: "Orchestration & Management"
    url: https://github.com/kubernetes-sigs/gateway-api-inference-extension
    extract: crd
    input:
      # manifests.yaml is the complete asset: v1 is stable-only and experimental
      # lacks InferencePool.
      releaseAsset: manifests.yaml

  - name: istio
    alias: Istio
    category: "Orchestration & Management"
    cncf: graduated
    pin: 2
    url: https://github.com/istio/istio
    extract: crd
    input:
      # Fetch the generated raw bundle consumed by the Helm base chart.
      crdFile: manifests/charts/base/files/crd-all.gen.yaml

  - name: jobset
    alias: JobSet
    category: "Orchestration & Management"
    url: https://github.com/kubernetes-sigs/jobset
    extract: crd
    input:
      # Base dir holds the full CRD; kustomization and patches sit one level up.
      crdDir: config/components/crd/bases

  - name: karmada
    alias: Karmada
    category: "Orchestration & Management"
    cncf: incubating
    url: https://github.com/karmada-io/karmada
    extract: crd
    input:
      # Per-kind CRD files in grouped subdirs; sibling kustomization only patches
      # webhooks. Vendored MCS CRDs belong to mcs-api.
      crdDir: charts/karmada/_crds/bases
      exclude:
        - multicluster.x-k8s.io_*

  # Karpenter: take shared karpenter.sh CRDs only from core. Provider repos
  # vendor them too, so each provider source targets only its nodeclass.
  - name: karpenter
    alias: Karpenter
    project: karpenter
    url: https://github.com/kubernetes-sigs/karpenter
    extract: crd
    input:
      crdDir: pkg/apis/crds

  - name: karpenter-aws
    alias: Karpenter AWS
    project: karpenter
    url: https://github.com/aws/karpenter-provider-aws
    extract: crd
    input:
      # Target only the AWS nodeclass; shared karpenter.sh CRDs come from core.
      crdFile: pkg/apis/crds/karpenter.k8s.aws_ec2nodeclasses.yaml

  - name: karpenter-azure
    alias: Karpenter Azure
    project: karpenter
    url: https://github.com/Azure/karpenter-provider-azure
    extract: crd
    input:
      # Target only the Azure nodeclass; shared karpenter.sh CRDs come from core.
      crdFile: pkg/apis/crds/karpenter.azure.com_aksnodeclasses.yaml

  - name: karpenter-provider-cluster-api
    alias: Karpenter Cluster API
    project: karpenter
    url: https://github.com/kubernetes-sigs/karpenter-provider-cluster-api
    extract: crd
    input:
      # Target only the Cluster API nodeclass and skip the sibling List-kind CRD.
      crdFile: config/crd/bases/karpenter.cluster.x-k8s.io_clusterapinodeclasses.yaml

  - name: karpenter-provider-ibm-cloud
    alias: Karpenter IBM Cloud
    project: karpenter
    url: https://github.com/kubernetes-sigs/karpenter-provider-ibm-cloud
    extract: crd
    input:
      # Target only the IBM nodeclass; shared karpenter.sh CRDs come from core.
      crdFile: config/components/crds/karpenter-ibm.sh_ibmnodeclasses.yaml

  - name: keda
    alias: KEDA
    category: "Orchestration & Management"
    cncf: graduated
    pin: 3
    url: https://github.com/kedacore/keda
    extract: crd
    input:
      # CRD asset embeds the version, so use a glob.
      releaseAsset: "keda-*-crds.yaml"

  - name: kgateway
    alias: kgateway
    category: "Orchestration & Management"
    cncf: sandbox
    url: https://github.com/kgateway-dev/kgateway
    extract: crd
    input:
      # No CRD release asset; use the CRD-only Helm chart plain templates.
      # Vendored Gateway API stays with the gateway-api source.
      crdDir: install/helm/kgateway-crds/templates

  - name: kjob
    alias: kjob
    category: "Orchestration & Management"
    url: https://github.com/kubernetes-sigs/kjob
    extract: crd
    input:
      crdDir: config/crd/bases

  - name: kubeedge
    alias: KubeEdge
    category: "Orchestration & Management"
    cncf: graduated
    url: https://github.com/kubeedge/kubeedge
    extract: crd
    input:
      # Fetch generated CRDs under build/crds; manifests and charts are duplicates.
      crdDir: build/crds

  - name: kuberay
    alias: KubeRay
    category: "Orchestration & Management"
    url: https://github.com/ray-project/kuberay
    extract: crd
    input:
      # Bare per-kind Helm chart CRDs with no release bundle.
      crdDir: helm-chart/kuberay-operator/crds

  - name: kueue
    alias: Kueue
    category: "Orchestration & Management"
    pin: 5
    url: https://github.com/kubernetes-sigs/kueue
    extract: crd
    input:
      # Full install bundle; the extractor keeps the CRDs.
      releaseAsset: manifests.yaml

  - name: kuma
    alias: Kuma
    category: "Orchestration & Management"
    cncf: sandbox
    url: https://github.com/kumahq/kuma
    extract: crd
    input:
      crdDir: deployments/charts/kuma/crds

  - name: kwok
    alias: KWOK
    category: "Orchestration & Management"
    url: https://github.com/kubernetes-sigs/kwok
    extract: crd
    input:
      crdDir: kustomize/crd/bases

  - name: lws
    alias: LeaderWorkerSet
    category: "Orchestration & Management"
    url: https://github.com/kubernetes-sigs/lws
    extract: crd
    input:
      crdDir: config/crd/bases

  - name: linkerd
    alias: Linkerd
    category: "Orchestration & Management"
    cncf: graduated
    url: https://github.com/linkerd/linkerd2
    extract: crd
    input:
      # Chart CRD templates contain Helm directives and vendored Gateway API, so
      # use the rendered CLI golden bundle. Releases are edge-* only.
      crdFile: cli/cmd/testdata/install_crds.golden

  - name: metallb
    alias: MetalLB
    category: "Orchestration & Management"
    cncf: sandbox
    url: https://github.com/metallb/metallb
    extract: crd
    input:
      # /releases/latest points at chart tags, so constrain to app tags. The
      # sibling kustomization only patches webhooks.
      releaseTag: "v*"
      crdDir: config/crd/bases

  # Node Feature Discovery: target the NFD bundle next to its sample CR, and
  # pull NodeResourceTopology from its separate dir.
  - name: node-feature-discovery
    alias: Node Feature Discovery
    project: node-feature-discovery
    url: https://github.com/kubernetes-sigs/node-feature-discovery
    extract: crd
    input:
      crdFile: deployment/base/nfd-crds/nfd-api-crds.yaml

  - name: node-feature-discovery-nrt
    alias: NFD NodeResourceTopology
    project: node-feature-discovery
    url: https://github.com/kubernetes-sigs/node-feature-discovery
    extract: crd
    input:
      crdFile: deployment/base/noderesourcetopologies-crd/noderesourcetopologies.yaml

  - name: rancher-system-upgrade-controller
    alias: Rancher System Upgrade Controller
    category: "Orchestration & Management"
    url: https://github.com/rancher/system-upgrade-controller
    extract: crd
    input:
      releaseAsset: crd.yaml

  - name: traefik
    alias: Traefik
    category: "Orchestration & Management"
    url: https://github.com/traefik/traefik
    extract: crd
    input:
      # Committed raw CRD bundle.
      crdFile: docs/content/reference/dynamic-configuration/kubernetes-crd-definition-v1.yml

  - name: vertical-pod-autoscaler
    alias: Vertical Pod Autoscaler
    category: "Orchestration & Management"
    url: https://github.com/kubernetes/autoscaler
    extract: crd
    input:
      # kubernetes/autoscaler monorepo: releaseTag pins VPA tags and avoids
      # cluster-autoscaler or chart releases.
      releaseTag: "vertical-pod-autoscaler-*"
      crdFile: vertical-pod-autoscaler/deploy/vpa-v1-crd-gen.yaml

  # Volcano: target bases dirs for full all-version CRDs and avoid sibling
  # v1beta1 stubs. JobFlow lives in its own dir, hence a second source.
  - name: volcano
    alias: Volcano
    project: volcano
    url: https://github.com/volcano-sh/volcano
    extract: crd
    input:
      crdDir: config/crd/volcano/bases

  - name: volcano-jobflow
    alias: Volcano JobFlow
    project: volcano
    url: https://github.com/volcano-sh/volcano
    extract: crd
    input:
      crdDir: config/crd/jobflow/bases

