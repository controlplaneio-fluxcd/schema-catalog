<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flux Schema Catalog</title>
    <meta name="description" content="JSON schemas and field indexes for Kubernetes, OpenShift, the Flux ecosystem and CNCF projects.">
    <link rel="icon" href="/flux-operator-icon-color.svg" type="image/svg+xml">
    <link rel="preload" href="/InterVariable.woff2" as="font" type="font/woff2" crossorigin>
    <script>
      // Pre-paint theme: apply the stored choice before the stylesheet resolves
      // so a dark-theme user never sees a light flash.
      try {
        var t = localStorage.getItem("schema-catalog-theme");
        if (t === "light" || t === "dark") document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
