<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flux Schema Catalog: Kubernetes schemas for AI agents and CI pipelines</title>
    <meta name="description" content="An LLM-friendly kubectl explain for the CNCF Ecosystem, from Kubernetes core to the newest CRDs, extracted from upstream releases, rebuilt daily.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://schemas.fluxoperator.dev/">
    <meta property="og:image" content="https://schemas.fluxoperator.dev/og-image.png">
    <meta property="og:image:width" content="2400">
    <meta property="og:image:height" content="1260">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="https://schemas.fluxoperator.dev/">
    <meta property="og:title" content="Flux Schema Catalog: Kubernetes schemas for AI agents and CI pipelines">
    <meta property="og:description" content="An LLM-friendly kubectl explain for the CNCF Ecosystem, from Kubernetes core to the newest CRDs, extracted from upstream releases, rebuilt daily.">
    <link rel="icon" href="/flux-operator-icon-color.svg" type="image/svg+xml">
    <link rel="preload" href="/InterVariable.woff2" as="font" type="font/woff2" crossorigin>
    <script>
      // Pre-paint theme: apply the stored choice before the stylesheet resolves
      // so a dark-theme user never sees a light flash.
      try {
        var t = localStorage.getItem("schema-catalog-theme");
        if (t === "light" || t === "dark") document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
